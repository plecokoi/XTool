<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <script src="../theme-sync.js"></script>
</head>

<body>

    <nav class="navBar">
        <ul>
            <a href="../index.html" class="webLogo"><span><i class="material-symbols-outlined">handyman</i>XTool<i
                        class="material-symbols-outlined">handyman</i></span></a>
        </ul>
    </nav>

    <div class="app-container">
        <h1 class="app-title">Calculator</h1>
        <div class="calculator">
            <div class="main_frame">
                <div class="output">
                    <div data-previous-output class="operand"></div>
                    <div data-current-output class="solution"></div>
                </div>
                <button data-all-clear class="span_two">AC</button>
                <button data-clear>DEL</button>
                <button data-operation>+</button>
                <button data-number>1</button>
                <button data-number>2</button>
                <button data-number>3</button>
                <button data-operation>-</button>
                <button data-number>4</button>
                <button data-number>5</button>
                <button data-number>6</button>
                <button data-operation>×</button>
                <button data-number>7</button>
                <button data-number>8</button>
                <button data-number>9</button>
                <button data-operation>÷</button>
                <button data-number>.</button>
                <button data-number>0</button>
                <button data-solution class="span_two">=</button>
            </div>
        </div>
    </div>

    <!--styling navbar-->
    <style>
        /*nav bar*/

        @import url('https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100..900;1,100..900&display=swap');

        :root {
            --theme-color: cadetblue;
            --theme-color-dark: rgb(67, 131, 132);
        }

        .navBar {
            background-color: var(--theme-color);
            position: absolute;
            padding: 20px 0 20px 0;
            min-width: 300px;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1;
            overflow-x: hidden;
        }

        nav li {
            display: inline;
            color: white;
            float: inline-end;
            padding-right: 5%;
        }

        nav i:hover {
            text-shadow: 0 0 25px white;
            transition: all ease 250ms;
        }

        nav i {
            cursor: pointer;
            user-select: none;
        }

        nav a {
            font-family: "Exo 2", sans-serif;
            text-decoration: none;
            font-size: 175%;
            color: white;
            cursor: pointer;
            padding: 10px;
            text-align: center;
            position: relative;

        }

        /*logo animation*/

        nav a::before {
            content: "";
            position: absolute;
            top: 0;
            margin: 0;
            padding: 0;
            width: 0;
            height: 2px;
            background-color: white;
        }

        nav a:hover::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 2px;
            background-color: white;
            transition: all ease 600ms;
        }

        nav a::after {
            content: "";
            position: absolute;
            bottom: 0;
            margin: 0;
            padding: 0;
            width: 0;
            height: 2px;
            background-color: white;
        }

        nav a:hover::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 2px;
            background-color: white;
            transition: all ease 600ms;
        }
    </style>

    <script src='main.js'></script>
</body>

</html>
