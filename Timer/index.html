<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <script src="../theme-sync.js"></script>
</head>


<body>

    <!--nav bar-->
    <nav class="navBar">
        <ul>
            <a href="../index.html" class="webLogo"><span><i class="material-symbols-outlined">handyman</i>XTool<i class="material-symbols-outlined">handyman</i></span></a>
        </ul>
    </nav>

    <div class="app-container">

        <h1 class="app-title">Timer</h1>

        <div class="timer-div">
            
            <div class="timer-box">

                <div class="hour-div">
                    <span class="value">00</span>
                    <span class="unit">hour</span>
                </div>

                <div class="min-div">
                    <span class="value">00</span>
                    <span class="unit">min</span>
                </div>

                <div class="sec-div">
                    <span class="value">00</span>
                    <span class="unit">sec</span>
                </div>

            </div>

            <div class="button-panel">

                <button type="button" class="start-btn">
                    <span class="material-symbols-outlined startBtnText">play_arrow</span>
                </button>

                <button type="button" class="restart-btn">
                    <span class="material-symbols-outlined">refresh</span>
                </button>

            </div>

            <div class="noti-div">
                <span class="noti-msg">Notification</span>
            </div>
            
        </div>

    </div>


    <style>
        /*nav bar*/

        @import url('https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100..900;1,100..900&display=swap');

        :root{
            --theme-color: cadetblue;
            --theme-color-dark: rgb(67, 131, 132);
        }

        .navBar{
            background-color: var(--theme-color);
            position: absolute;
            padding: 20px 0 20px 0;
            min-width: 300px;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1;
            overflow-x: hidden;
        }

        nav li{
            display: inline;
            color: white;
            float: inline-end;
            padding-right: 5%;
        }

        nav i:hover{
            text-shadow: 0 0 25px white;
            transition: all ease 250ms;
        }

        nav i{
            cursor: pointer;
        }

        nav a{
            font-family: "Exo 2", sans-serif;
            text-decoration: none;
            font-size: 175%;
            color: white;
            cursor: pointer;
            padding: 10px;
            text-align: center;
            position: relative;
        }

        /*logo animation*/

        nav a::before{
            content: "";
            position: absolute;
            top: 0;
            margin: 0;
            padding: 0;
            width: 0;
            height: 2px;
            background-color: white;
        }
        nav a:hover::before{
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 2px;
            background-color: white;
            transition: all ease 600ms;
        }
        nav a::after{
            content: "";
            position: absolute;
            bottom: 0;
            margin: 0;
            padding: 0;
            width: 0;
            height : 2px;
            background-color: white;
        }
        nav a:hover::after{
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            margin: 0;
            padding: 0;
            width: 100%;
            height : 2px;
            background-color: white;
            transition: all ease 600ms;
        }
    </style>

    <script src="main.js"></script>

</body>
</html>
