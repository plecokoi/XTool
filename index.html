<!DOCTYPE html>
<html lang="en" translate="no">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XTool</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>

<body>

    <nav class="navBar">
        <ul>
            <a href="index.html" class="webLogo"><span><i class="material-symbols-outlined">handyman</i>XTool<i class="material-symbols-outlined">handyman</i></span></a>
            <li><i class="material-symbols-outlined" id="searchButton">search</i></li>
            <li><i class="material-symbols-outlined" id="menuButton">menu</i></li>
        </ul>
       
    </nav>

    <div class="menuDiv">
        <ul>
             <li><span id="favourites">Favourites</span></li>
            <li><span id="recents">Recents</span></li>
            <li><span id="settings" data-url="Settings/index.html">Settings</span></li>
        </ul>
       
    </div>

    <div class="searchDiv">
        <input type="text" placeholder="search" id="searchBox" autocomplete="off">
    </div>



    <div class="devTextDiv">
        <span class="devTextSpan">DEV TEXT</span>
    </div>

    <button type="button" class="closeBtn"><span class="material-symbols-outlined">close</span></button>



    <div class="settingsDiv">

        <div class="settingsSection">
            <h3>Appearance</h3>
            
            <div class="settingRow">
                <label>Theme</span></label>
                <button type="button" id="darkModeToggle" data-setting="theme">Toggle Dark Mode</button>
            </div>
            
            <div class="settingRow">
                <label for="cardSizeSelect">Card Layout Size</label>
                <select id="cardSizeSelect" data-setting="cardSize">
                    <option value="normal">Normal (Default)</option>
                    <option value="compact">Compact</option>
                </select>
            </div>

        </div>

        <div class="settingsSection">
            <h3>Preferences</h3>

            <div class="settingRow">
                <label>Launch tools in new tab</label>
                <input type="checkbox" id="newTabCheckbox" data-setting="newTab">
            </div>

            <div class="settingRow">
                <label>Recent tools limit (<span id="historyVal">3</span>)</label>
                <input type="range" id="historyLimitSlider" min="3" max="10" value="3" data-setting="recentCount">
            </div>
        </div>

        <div class="settingsSection">
            <h3>Data & Privacy</h3>

            <div class="settingRow buttonsRow">
                <button type="button" class="dangerBtn" id="clearRecentsBtn">Clear History</button>
                <button type="button" class="dangerBtn" id="clearFavsBtn">Reset Favorites</button>
                <button type="button" class="dangerBtn" id="clearSettingsBtn">Reset Settings</button>
            </div>

            <div class="settingRow">
                <label>History retention policy</label>
                <select id="autoClearSelect" data-setting="history">
                    <option value="forever">Keep History Forever</option>
                    <option value="1hour">Clear Recents After 1 Hour</option>
                    <option value="1day">Clear Recents After 1 Day</option>
                    <option value="session">Clear Upon Browser Close</option>
                </select>
            </div>
        </div>
    
    </div>


    <div class="toolContainer"></div>



    <!--styling navbar-->
    <style>
        /*nav bar*/

        @import url('https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100..900;1,100..900&display=swap');

        :root {
            --theme-color: cadetblue;
            --theme-color-dark: rgb(67, 131, 132);
        }

        .navBar {
            background-color: var(--theme-color);
            position: absolute;
            padding: 20px 0 20px 0;
            min-width: 300px;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1;
            overflow-x: hidden;
        }

        nav li {
            display: inline;
            color: white;
            float: inline-end;
            padding-right: 5%;
        }

        nav i:hover {
            text-shadow: 0 0 25px white;
            transition: all ease 250ms;
        }

        nav i {
            cursor: pointer;
            user-select: none;
        }

        nav a {
            font-family: "Exo 2", sans-serif;
            text-decoration: none;
            font-size: 175%;
            color: white;
            cursor: pointer;
            padding: 10px;
            text-align: center;
            position: relative;
        }

        /*logo animation*/

        nav a::before {
            content: "";
            position: absolute;
            top: 0;
            margin: 0;
            padding: 0;
            width: 0;
            height: 2px;
            background-color: white;
        }

        nav a:hover::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 2px;
            background-color: white;
            transition: all ease 600ms;
        }

        nav a::after {
            content: "";
            position: absolute;
            bottom: 0;
            margin: 0;
            padding: 0;
            width: 0;
            height: 2px;
            background-color: white;
        }

        nav a:hover::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 2px;
            background-color: white;
            transition: all ease 600ms;
        }
    </style>

    <script src="tools.js"></script>
    <script src="main.js"></script>


</body>

</html>
