<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text to Speech</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <script src="../theme-sync.js"></script>
    <style>
        /*nav bar*/

        @import url('https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100..900;1,100..900&display=swap');

        :root {
            --theme-color: cadetblue;
            --theme-color-dark: rgb(67, 131, 132);
        }

        .navBar {
            background-color: var(--theme-color);
            position: absolute;
            padding: 20px 0 20px 0;
            min-width: 300px;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1;
            overflow-x: hidden;
        }

        nav li {
            display: inline;
            color: white;
            float: inline-end;
            padding-right: 5%;
        }

        nav i:hover {
            text-shadow: 0 0 25px white;
            transition: all ease 250ms;
        }

        nav i {
            cursor: pointer;
            user-select: none;
        }

        nav a {
            font-family: "Exo 2", sans-serif;
            text-decoration: none;
            font-size: 175%;
            color: white;
            cursor: pointer;
            padding: 10px;
            text-align: center;
            position: relative;
        }

        /*logo animation*/

        nav a::before {
            content: "";
            position: absolute;
            top: 0;
            margin: 0;
            padding: 0;
            width: 0;
            height: 2px;
            background-color: white;
        }

        nav a:hover::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 2px;
            background-color: white;
            transition: all ease 600ms;
        }

        nav a::after {
            content: "";
            position: absolute;
            bottom: 0;
            margin: 0;
            padding: 0;
            width: 0;
            height: 2px;
            background-color: white;
        }

        nav a:hover::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 2px;
            background-color: white;
            transition: all ease 600ms;
        }
    </style>

</head>


<body>

    <nav class="navBar">
        <ul>
            <a href="../index.html" class="webLogo"><span><i class="material-symbols-outlined">handyman</i>XTool<i
                        class="material-symbols-outlined">handyman</i></span></a>
        </ul>
    </nav>

    <div class="app-div">

        <h1>Text to Speech</h1>

        <div class="app-panel">

            <textarea class="input-box" placeholder="Enter your text"></textarea>

            <div class="btn-panel">

                <button class="btn" type="button" onclick="toggleSpeech()">
                    <i class="material-symbols-outlined">
                        <span id="playPauseIcon">play_arrow</span>
                    </i>
                </button>

                <button class="btn" type="button" onclick="restartSpeech()">
                    <i class="material-symbols-outlined">refresh</i>
                </button>

                <button class="btn" type="button" onclick="clearText()">
                    <i class="material-symbols-outlined">delete</i>
                </button>

            </div>

            <div class="bottom-panel">

                <div class="option-panel settings-panel">

                    <label>Speed: <span class="setting-span" id="speedValue">1</span></label>
                    <input class="setting-input" type="range" id="speedSlider" min="0.1" max="10" step="0.1">

                    <br>

                    <label>Pitch: <span class="setting-span" id="pitchValue">1</span></label>
                    <input class="setting-input" type="range" id="pitchSlider" min="0" max="2" step="0.1">

                    <br>

                    <label>Volume: <span class="setting-span" id="volumeValue">1</span></label>
                    <input class="setting-input" type="range" id="volumeSlider" min="0" max="1" step="0.1">

                </div>

                <div class="option-panel voice-panel">
                    <p>Select voice</p>
                    <select class="voice-select"></select>
                </div>

            </div>

        </div>


    </div>



    <script src="main.js"></script>

</body>

</html>
